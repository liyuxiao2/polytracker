target-version = "py311"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E712",   # == True comparisons (required for SQLAlchemy filter expressions)
    "B007",   # unused loop control variable (common in paginated fetches)
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
    "SIM102", # nested if statements (sometimes clearer than combined conditions)
    "SIM105", # contextlib.suppress (try/except/pass is often clearer)
]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"

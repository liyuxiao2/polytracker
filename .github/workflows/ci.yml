name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  autoformat:
    name: Auto-format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend tools
        run: pip install ruff

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Ruff format (backend)
        run: ruff format backend/

      - name: Ruff lint --fix (backend)
        run: ruff check --fix backend/

      - name: Prettier format (frontend)
        run: cd frontend && npx -y prettier --write "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: ESLint fix (frontend)
        run: cd frontend && npx next lint --fix --dir .

      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: auto-format code"
          git push

  lint:
    name: Lint & Quality
    runs-on: ubuntu-latest
    needs: [autoformat]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend tools
        run: pip install ruff

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Ruff lint (backend)
        run: ruff check backend/

      - name: Ruff format check (backend)
        run: ruff format --check backend/

      - name: ESLint (frontend)
        run: cd frontend && npx next lint

      - name: Prettier check (frontend)
        run: cd frontend && npx -y prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: TypeScript type check (frontend)
        run: cd frontend && npx tsc --noEmit

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: cd backend && python -m pytest -v
        env:
          MOCK_MODE: "true"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --passWithNoTests

      - name: Build check
        run: cd frontend && npm run build
